<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: linear-gradient(to right, #008080, #00FF00, #FFFF00, #FF0000, #804000);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      font-family: 'Fancy';
      color: white;
      text-align: center;
      animation: bounce 2s infinite;
      animation-timing-function: linear;
    }
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
    .flash {
      animation: flash 1s infinite;
    }
    @keyframes flash {
      0%, 100% {
        color: white;
      }
      50% {
        color: black;
      }
    }
  </style>
</head>
<body>
  <h1 class="flash">I love you dumbass</h1>
</body>
</html>
